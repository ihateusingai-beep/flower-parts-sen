<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花的部分 - SEN 學習</title>
<style>
:root {
  --owl-green: #58cc02;
  --owl-green-deep: #58a700;
  --snow: #ffffff;
  --eel: #f7f7f7;
  --swan: #e5e5e5;
  --wolf: #777777;
  --eel-black: #3c3c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Microsoft JhengHei', system-ui, sans-serif; 
  background: #f7f7f7; 
  min-height: 100vh; 
  color: #3c3c3c;
}
.page { display: none; min-height: 100vh; padding: 20px; }
.page.active { display: flex; flex-direction: column; align-items: center; }

/* HOME */
#home { justify-content: center; background: #f7f7f7; }
.home-card { 
  background: #ffffff; 
  border: 2px solid #e5e5e5; 
  border-bottom: 4px solid #e5e5e5; 
  border-radius: 16px; 
  padding: 32px; 
  max-width: 420px; 
  width: 100%; 
  text-align: center; 
  box-shadow: 0 2px 0 #d7d7d7;
}
.home-title { font-size: 2.4em; font-weight: 800; margin-bottom: 12px; }
.name-input { 
  width: 100%; 
  padding: 16px; 
  font-size: 1.4em; 
  border: 3px solid #e5e5e5; 
  border-radius: 12px; 
  margin-bottom: 20px; 
  text-align: center; 
}
.start-btn { 
  background: #58cc02; 
  color: #fff; 
  border: none; 
  padding: 18px 48px; 
  font-size: 1.4em; 
  font-weight: 800; 
  border-radius: 16px; 
  cursor: pointer; 
  width: 100%; 
  border-bottom: 4px solid #58a700;
}
.start-btn:hover { background: #89e219; }

/* HUB */
#hub { background: #f7f7f7; justify-content: center; }
.hub-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 420px; }
.hub-card { 
  background: #ffffff; 
  border: 2px solid #e5e5e5; 
  border-bottom: 4px solid #e5e5e5; 
  border-radius: 16px; 
  padding: 20px; 
  cursor: pointer; 
  text-align: center;
  box-shadow: 0 2px 0 #d7d7d7;
}
.hub-icon { font-size: 2.4em; margin-bottom: 8px; }
.hub-title { font-size: 1.3em; font-weight: 700; }

/* Preference Button */
.pref-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  width: 48px;
  height: 48px;
  background: #1cb0f6;
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 1.4em;
  cursor: pointer;
  z-index: 1000;
  box-shadow: 0 2px 0 #0d8ed1;
}

/* Settings Panel */
.settings-panel {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  height: 100vh;
  background: #ffffff;
  border-left: 3px solid #e5e5e5;
  padding: 24px;
  z-index: 1001;
  transition: right 0.3s ease;
  box-shadow: -4px 0 12px rgba(0,0,0,0.1);
}
.settings-panel.show {
  right: 0;
}
.settings-title {
  font-size: 1.5em;
  font-weight: 800;
  margin-bottom: 24px;
  color: #3c3c3c;
}
.setting-row {
  margin-bottom: 24px;
}
.setting-label {
  font-size: 1.1em;
  font-weight: 700;
  margin-bottom: 8px;
  display: block;
}
.setting-val {
  color: #58cc02;
  font-weight: 800;
}
input[type="range"] {
  width: 100%;
  margin: 8px 0;
}
.speed-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.9em;
  color: #777777;
}
</style>
</head>
<body>
<button class="pref-btn" onclick="toggleSettings()">⚙️</button>

<!-- HOME -->
<div id="home" class="page active">
  <div class="home-card">
    <div class="home-title">🌸 花的部分</div>
    <p style="font-size:1.3em; margin-bottom:24px; color:#666;">SEN 科學學習</p>
    
    <input type="text" id="studentName" class="name-input" placeholder="輸入你的名字" value="">
    
    <button class="start-btn" onclick="startLearning()">開始學習</button>
  </div>
</div>

<!-- HUB -->
<div id="hub" class="page">
  <div style="max-width:420px; width:100%; text-align:center;">
    <div id="hubGreeting" style="font-size:1.8em; margin-bottom:24px; font-weight:700;"></div>
    
    <div class="hub-grid">
      <div class="hub-card" onclick="goTo('slides')">
        <div class="hub-icon">📖</div>
        <div class="hub-title">花的故事</div>
      </div>
      <div class="hub-card" onclick="goTo('parts')">
        <div class="hub-icon">📜</div>
        <div class="hub-title">部分詳解</div>
      </div>
      <div class="hub-card" onclick="goTo('match')">
        <div class="hub-icon">✍️</div>
        <div class="hub-title">功能配對</div>
      </div>
      <div class="hub-card" onclick="goTo('vocab')">
        <div class="hub-icon">📚</div>
        <div class="hub-title">詞語學習</div>
      </div>
      <div class="hub-card" onclick="goTo('quiz')">
        <div class="hub-icon">📝</div>
        <div class="hub-title">小評估</div>
      </div>
    </div>
  </div>
</div>

<script>
let state = {
  name: '',
  completed: { slides: false, parts: false, match: false, vocab: false, quiz: false }
};

function startLearning() {
  const nameInput = document.getElementById('studentName').value.trim();
  state.name = nameInput || '同學';
  localStorage.setItem('flowerStudentName', state.name);
  
  document.getElementById('hubGreeting').textContent = '👋 ' + state.name + '，準備好學習花的知識了嗎？';
  goTo('hub');
}

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function loadName() {
  const saved = localStorage.getItem('flowerStudentName');
  if (saved) {
    document.getElementById('studentName').value = saved;
  }
}

window.onload = loadName;

let settings = {
  fontSize: 2,
  speed: 0.85
};

function loadSettings() {
  const saved = localStorage.getItem('flowerSettings');
  if (saved) {
    try { settings = JSON.parse(saved); } catch(e) {}
  }
  applySettings();
}

function saveSettings() {
  localStorage.setItem('flowerSettings', JSON.stringify(settings));
}

function applySettings() {
  const sizeMap = {1: '16px', 2: '18px', 3: '22px'};
  document.body.style.fontSize = sizeMap[settings.fontSize];
  
  const speedVal = document.getElementById('speedVal');
  if (speedVal) speedVal.textContent = settings.speed < 0.7 ? '慢' : settings.speed > 0.9 ? '快' : '正常';
}

function updateFontSize(val) {
  settings.fontSize = parseInt(val);
  applySettings();
  saveSettings();
}

function updateSpeed(val) {
  settings.speed = parseFloat(val);
  applySettings();
  saveSettings();
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('show');
}

function speak(text) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-HK';
    u.rate = settings.speed;
    speechSynthesis.speak(u);
  }
}

window.onload = function() {
  loadName();
  loadSettings();
};

let currentMode = 1;

function selectMode(mode) {
  currentMode = mode;
  const titles = {
    1: "🖼️ 識圖模式",
    2: "🔗 功能配對模式", 
    3: "📝 選擇題模式"
  };
  document.getElementById('modeTitle').textContent = titles[mode];
  goTo('difficulty');
}

function startAssessment(level) {
  // Placeholder for now - will implement full logic next
  alert('模式 ' + currentMode + ' | 難度 ' + level + '（框架已就緒）');
  goTo('hub');
}
</script>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-title">⚙️ 學習設定</div>
  
  <div class="setting-row">
    <div class="setting-label">字體大小 <span class="setting-val" id="fontSizeVal">中</span></div>
    <input type="range" id="fontSizeSlider" min="1" max="3" step="1" value="2" oninput="updateFontSize(this.value)">
  </div>
  
  <div class="setting-row">
    <div class="setting-label">說話速度 <span class="setting-val" id="speedVal">正常</span></div>
    <input type="range" id="speedSlider" min="0.5" max="1.0" step="0.1" value="0.85" oninput="updateSpeed(this.value)">
    <div class="speed-labels"><span>🐢 慢</span><span>🐇 快</span></div>
  </div>
</div>

<!-- ASSESSMENT MODES -->
<div id="quiz" class="page">
  <div style="max-width:420px; width:100%; text-align:center;">
    <div style="font-size:1.8em; font-weight:800; margin-bottom:24px;">📝 選擇評估模式</div>
    
    <div style="display:flex; flex-direction:column; gap:16px; margin-bottom:24px;">
      <button onclick="selectMode(1)" style="padding:20px; font-size:1.4em; background:#fff; border:3px solid #e5e5e5; border-radius:16px; cursor:pointer;">
        🖼️ 識圖模式<br><span style="font-size:0.8em; color:#777;">點擊正確部位</span>
      </button>
      <button onclick="selectMode(2)" style="padding:20px; font-size:1.4em; background:#fff; border:3px solid #e5e5e5; border-radius:16px; cursor:pointer;">
        🔗 功能配對<br><span style="font-size:0.8em; color:#777;">配對雄蕊/雌蕊功能</span>
      </button>
      <button onclick="selectMode(3)" style="padding:20px; font-size:1.4em; background:#fff; border:3px solid #e5e5e5; border-radius:16px; cursor:pointer;">
        📝 選擇題<br><span style="font-size:0.8em; color:#777;">A/B/C/D 選擇</span>
      </button>
    </div>
    
    <button onclick="goTo('hub')" style="padding:14px 32px; background:#fff; border:2px solid #e5e5e5; border-radius:12px; font-size:1.1em;">🏠 返回中心</button>
  </div>
</div>

<!-- DIFFICULTY SELECTION -->
<div id="difficulty" class="page">
  <div style="max-width:420px; width:100%; text-align:center;">
    <div id="modeTitle" style="font-size:1.6em; font-weight:800; margin-bottom:24px;"></div>
    
    <div style="display:flex; flex-direction:column; gap:16px; margin-bottom:24px;">
      <button onclick="startAssessment(1)" style="padding:18px; font-size:1.3em; background:#dbf8c5; border:3px solid #58cc02; border-radius:16px; cursor:pointer;">
        🟢 初階（容易）
      </button>
      <button onclick="startAssessment(2)" style="padding:18px; font-size:1.3em; background:#fff; border:3px solid #e5e5e5; border-radius:16px; cursor:pointer;">
        🟡 中階（普通）
      </button>
      <button onclick="startAssessment(3)" style="padding:18px; font-size:1.3em; background:#fff; border:3px solid #e5e5e5; border-radius:16px; cursor:pointer;">
        🔴 高階（較難）
      </button>
    </div>
    
    <button onclick="goTo('quiz')" style="padding:14px 32px; background:#fff; border:2px solid #e5e5e5; border-radius:12px; font-size:1.1em;">⬅️ 返回模式選擇</button>
  </div>
</div>
</body>
</html>
